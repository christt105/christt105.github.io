# Pages placed under these sections will be shown on homepage and archive page.
mainSections = ["blog"]
# Output page's full content in RSS.
rssFullContent = true
favicon = "/favicon.ico"

# Accepted values: "default", "lastmod"
# default = see https://gohugo.io/quick-reference/glossary/#default-sort-order
# lastmod = sort by last modified date, in descending order
SortBy = "default"

[footer]
since = 2024
customText = ""

[dateFormat]
published = ":date_full"
lastUpdated = ":date_full"

[sidebar]
emoji = ""
subtitle = "Software Developer"
compact = false
avatar = "img/author.webp"
avatarBlog = "img/blog-avatar.webp"

[article]
headingAnchor = false
math = false
readingTime = false

[article.license]
enabled = true
default = "Licensed under CC BY-NC-SA 4.0"

[widgets]
homepage = [
    { type = "search" },
    { type = "archives", params = { limit = 5 } },
    { type = "categories", params = { limit = 10 } },
    { type = "tag-cloud", params = { limit = 10 } },
]
page = [{ type = "toc" }]

[opengraph.twitter]
site = ""
card = "summary_large_image"

[colorScheme]
toggle = false
default = "dark"

## Comments
[comments]
enabled = true
provider = "giscus"

[comments.giscus]
repo = "christt105/christt105.github.io"
repoID = "MDEwOlJlcG9zaXRvcnkyNDMzNDM4OTI"
category = "Announcements"
categoryID = "DIC_kwDODoEiFM4CrwbC"
mapping = "pathname"
lightTheme = ""
darkTheme = ""
reactionsEnabled = 1
emitMetadata = 0
